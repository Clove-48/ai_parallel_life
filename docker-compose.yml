# AI 平行人生 — Docker Compose 编排
version: "3.8"

services:
  backend:
    build: ./backend
    container_name: parallel-life-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DATABASE_URL=sqlite:///./parallel_life.db
      - CORS_ORIGINS=http://localhost,http://127.0.0.1
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/parallel_life.db:/app/parallel_life.db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: parallel-life-frontend
    ports:
      - "80:80"
    volumes:
      - ./HTML:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped